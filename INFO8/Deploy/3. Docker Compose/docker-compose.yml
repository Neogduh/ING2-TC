name: sundaland-prod

services:
  sundaland-backend:
    image: registry.cri.epita.fr/ing/majeures/tc/info/sundaland/sundaland-backend:1.0.0
    depends_on:
      - mongodb
    networks:
      - sunda-net
      - sunda-back-net
    restart: always
    environment:
      - SUNDALAND_MONGODB_USER=sundaland
      - SUNDALAND_MONGODB_PASSWORD=sundaland
      - SUNDALAND_MONGODB_HOST=mongodb
      - SUNDALAND_MONGODB_DATABASE=sundaland
      - SUNDALAND_ADMIN_TOKEN=admin-secret-token

  sundaland-frontend:
    image: registry.cri.epita.fr/ing/majeures/tc/info/sundaland/sundaland-frontend:1.1.1
    networks:
      - sunda-net
    restart: always

  mongodb:
    image: registry.cri.epita.fr/ing/majeures/tc/info/sundaland/mongo:7.0.5
    volumes:
      - mongodb-data:/data/db
      - ./configs/init_mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - sunda-back-net
    restart: always
    environment:
      - MONGO_INITDB_DATABASE=sundaland
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root

  nginx:
    image: registry.cri.epita.fr/ing/majeures/tc/info/sundaland/nginx:1.25.3
    depends_on:
      - sundaland-backend
      - sundaland-frontend
    networks:
      - sunda-net
    restart: always
    volumes:
      - ./configs/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:8080"

networks:
  sunda-back-net:
  sunda-net:

volumes:
  mongodb-data:
