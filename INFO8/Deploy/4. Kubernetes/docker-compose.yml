services:
  k3s:
    image: rancher/k3s:v1.30.0-k3s1
    container_name: k3s
    privileged: true
    command: server --disable traefik
    ports:
      - "6443:6443"
      - "8081:8081"
      - "8080:8080"
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - ./:/workspace
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666

volumes:
  k3s-data:
